{% load static %}


         

<section class="py-5 my-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-12 wow fadeIn col-lg-5 mb-5 mb-lg-0">
                <h2 class="display-5 fw-bold mb-5">We'd love to hear from you! Have questions or feedback? Reach out anytime!</h2>
                
                <h4 class="fw-bold">Address</h4>
                <p class="text-muted mb-5">  Phulbari Dinajpur, Dhaka, Bangladesh</p>
                
                <h4 class="fw-bold">Contact Us</h4>
                <p class="text-muted mb-1">rezwanhere93@gmail.com</p>
                <p class="text-muted mb-0">013342-62427</p>
            </div>

            <div class="col-12 wow fadeIn col-lg-6 offset-lg-1">
                <form action="#" class="mx-auto text-center p-5 bg-light rounded shadow-sm">
                    {% csrf_token %}
                    <input class="form-control form-control-lg mb-3" type="text" placeholder="Name">
                    <input class="form-control form-control-lg mb-3" type="email" placeholder="E-mail">
                    <textarea class="form-control form-control-lg mb-3" name="message" cols="30" rows="10" placeholder="Your Message..."></textarea>
                    <button type="submit" class="btn btn-success btn-lg w-100">Submit</button>
                </form>
            </div>
        </div>
    </div>
</section>
